# =============================================================================
# GENERIC ESP32-S3 INTERCOM (DUPLEX) - Single I2S bus, no hardware codec
# =============================================================================
# Simple intercom-only config. No media player, no mixer, no VA/MWW.
# For ESP32 boards where mic and speaker share the SAME I2S bus.
#
# Audio pipeline:
#   MEMS mic -> i2s_audio_duplex (48kHz) -> FIR decimation (16kHz) -> AEC -> intercom TX
#   Intercom RX (16kHz) -> resampler (48kHz) -> hw_speaker -> amp
#
# Volume controlled by speaker_volume number entity (persisted to flash).
# For full-featured (media player, mixer, VA-ready), see
# generic-esp32-s3-duplex-intercom-va.yaml
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker SHARE BCLK + LRCLK (same I2S bus, full-duplex)
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   Shared I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic), DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  name: generic-esp32-s3-duplex
  friendly_name: Generic Esp32-s3 Duplex

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:
  on_client_connected:
    - lambda: |-
        static bool published = false;
        if (!published) {
          published = true;
          id(intercom).publish_entity_states();
        }

ota:
  - platform: esphome

logger:
  hardware_uart: USB_CDC
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source:
      type: local
      path: esphome/components
    components: [intercom_api, i2s_audio_duplex, esp_aec]

# =============================================================================
# AEC (Acoustic Echo Cancellation)
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# =============================================================================
# I2S Audio Duplex - single bus, full-duplex (mic + speaker on same BCLK/LRCLK)
# =============================================================================
# Bus runs at 48kHz for optimal mic quality, FIR decimation to 16kHz for AEC/intercom.
i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO37          # WS - shared with mic
  i2s_bclk_pin: GPIO36           # SCK - shared with mic
  i2s_din_pin: GPIO35            # mic data
  i2s_dout_pin: GPIO7            # amp DIN
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  aec_id: aec_processor
  buffers_in_psram: true

# =============================================================================
# Microphone (post-AEC)
# =============================================================================
microphone:
  - platform: i2s_audio_duplex
    id: mic_component
    i2s_audio_duplex_id: i2s_duplex

# =============================================================================
# Speaker: hw_speaker (48kHz) <- resampler <- intercom (16kHz)
# =============================================================================
speaker:
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 48000

  - platform: resampler
    id: intercom_speaker
    output_speaker: hw_speaker
    bits_per_sample: 16

# =============================================================================
# INTERCOM API
# =============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_component
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s

  on_outgoing_call:
    - light.turn_on:
        id: status_led
        effect: "Calling"
    - if:
        condition:
          intercom_api.destination_is:
            id: intercom
            destination: "Home Assistant"
        then:
          - homeassistant.event:
              event: esphome.intercom_call
              data:
                caller: "${friendly_name}"
                destination: "Home Assistant"
                type: "doorbell"

  on_ringing:
    - light.turn_on:
        id: status_led
        effect: "Ringing"
        red: 100%
        green: 0%
        blue: 0%

  on_answered:
    - logger.log: "Call answered"

  on_streaming:
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 100%
        effect: none

  on_idle:
    - script.execute: restore_led

  on_hangup:
    - script.execute: restore_led
    - logger.log:
        format: "Hangup: %s"
        args: ['reason.c_str()']

  on_call_failed:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 70%
        effect: none
    - delay: 2s
    - script.execute: restore_led
    - logger.log:
        format: "Call failed: %s"
        args: ['reason.c_str()']

# =============================================================================
# Scripts
# =============================================================================
script:
  - id: restore_led
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: mute
              - switch.is_on: speaker_mute
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 40%
                effect: "Slow Pulse"
          else:
            - if:
                condition:
                  switch.is_on: mute
                then:
                  - light.turn_on:
                      id: status_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 30%
                      effect: none
                else:
                  - if:
                      condition:
                        switch.is_on: speaker_mute
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 100%
                            green: 50%
                            blue: 0%
                            brightness: 30%
                            effect: none
                      else:
                        - if:
                            condition:
                              or:
                                - intercom_api.is_ringing: intercom
                                - intercom_api.is_incoming: intercom
                            then:
                              - logger.log: "restore_led: ringing, keeping strobe"
                            else:
                              - if:
                                  condition:
                                    intercom_api.is_in_call: intercom
                                  then:
                                    - light.turn_on:
                                        id: status_led
                                        red: 0%
                                        green: 100%
                                        blue: 0%
                                        brightness: 100%
                                        effect: none
                                  else:
                                    - light.turn_off: status_led

# =============================================================================
# Buttons
# =============================================================================
button:
  - platform: template
    id: call_button
    name: Call
    icon: mdi:phone
    on_press:
      - intercom_api.call_toggle: intercom

  - platform: template
    id: next_contact_button
    name: Next Contact
    icon: mdi:skip-next
    on_press:
      - intercom_api.next_contact: intercom

  - platform: template
    id: prev_contact_button
    name: Previous Contact
    icon: mdi:skip-previous
    on_press:
      - intercom_api.prev_contact: intercom

  - platform: template
    id: decline_button
    name: Decline
    icon: mdi:phone-hangup
    on_press:
      - intercom_api.decline_call: intercom

  - platform: restart
    name: Restart

# =============================================================================
# Switches
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF

  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: mute
    name: Mic Mute
    icon: mdi:microphone-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - microphone.mute: mic_component
      - script.execute: restore_led
    on_turn_off:
      - microphone.unmute: mic_component
      - script.execute: restore_led

  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - speaker.mute_on: hw_speaker
      - script.execute: restore_led
    on_turn_off:
      - speaker.mute_off: hw_speaker
      - script.execute: restore_led

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "sr_low_cost"
    optimistic: true
    restore_value: true
    set_action:
      - logger.log:
          format: "Switching AEC mode to %s"
          args: ['x.c_str()']
      - lambda: |-
          int mode = 0;
          if (x == "sr_low_cost") mode = 0;
          else if (x == "sr_high_perf") mode = 1;
          else if (x == "voip_low_cost") mode = 3;
          else if (x == "voip_high_perf") mode = 4;
          id(i2s_duplex).stop();
          if (!id(aec_processor).reinit(static_cast<aec_mode_t>(mode))) {
            ESP_LOGE("aec_mode", "AEC reinit failed!");
          }
          id(i2s_duplex).start();

# =============================================================================
# Numbers
# =============================================================================
number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    speaker_volume:
      name: Speaker Volume
    mic_gain:
      name: Mic Gain
    mic_gain_pre_aec:
      name: Mic Gain Pre-AEC
      pre_aec: true

# =============================================================================
# Status LED (SK6812 on GPIO33 - change pin/chipset for your board)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    icon: mdi:led-on
    pin: GPIO33
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# Text Sensors
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'

# =============================================================================
# Diagnostics
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: Status
