# =============================================================================
# SPI BUS (DISPLAY)
# =============================================================================
spi:
  - id: spi_bus
    clk_pin: 4
    mosi_pin: 2

# =============================================================================
# DISPLAY (ILI9XXX - stripped of pages, LVGL handles rendering)
# =============================================================================
display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: GC9A01A
    invert_colors: true
    data_rate: 40MHz
    cs_pin: 5
    dc_pin: 47
    reset_pin:
      number: 38
    auto_clear_enabled: false
    dimensions:
      height: 240
      width: 240

# =============================================================================
# LVGL DISPLAY ENGINE
#
# Declarative widgets for VA + intercom pages. Static idle image,
# mood-based replying backgrounds, timer overlay on top_layer.
# =============================================================================
lvgl:
  displays:
    - s3_box_lcd
  buffer_size: 50%
  color_depth: 16
  log_level: WARN
  top_layer:
    widgets:
      # Timer overlay bar (hidden by default, shown on idle/listening/thinking/muted)
      # Dimensions set by reposition_widgets from y_metrics[13] and y_metrics[2]
      - obj:
          id: timer_overlay
          align: TOP_MID
          width: 1
          height: 1
          bg_color: 0xFFFFFF
          border_color: 0x000000
          border_width: 1
          hidden: true
          widgets:
            - bar:
                id: timer_bar
                align: CENTER
                width: 1
                height: 1
                min_value: 0
                max_value: 100
                value: 50
                indicator:
                  bg_color: 0x26ED3A
            - label:
                id: timer_label
                align: CENTER
                text: ""
                text_color: 0x000000
                text_font: font_timer
  pages:
    # ========================================================================
    # INITIALIZATION PAGE
    # ========================================================================
    - id: initializing_page
      bg_color: 0x000000
      widgets:
        - image:
            align: CENTER
            src: assistant_gui_initializing

    # ========================================================================
    # VA: IDLE PAGE
    # ========================================================================
    - id: idle_page
      bg_color: 0x000000
      widgets:
        # Idle animation: fwd 0→19 + 2s hold + bwd 18→0 = 55 frames @ 120ms = 6.6s
        - animimg:
            id: idle_anim
            align: CENTER
            width: 240
            height: 240
            src:
              - idle_00
              - idle_01
              - idle_02
              - idle_03
              - idle_04
              - idle_05
              - idle_06
              - idle_07
              - idle_08
              - idle_09
              - idle_10
              - idle_11
              - idle_12
              - idle_13
              - idle_14
              - idle_15
              - idle_16
              - idle_17
              - idle_18
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_19
              - idle_18
              - idle_17
              - idle_16
              - idle_15
              - idle_14
              - idle_13
              - idle_12
              - idle_11
              - idle_10
              - idle_09
              - idle_08
              - idle_07
              - idle_06
              - idle_05
              - idle_04
              - idle_03
              - idle_02
              - idle_01
            duration: 6600ms
            auto_start: false
        - label:
            id: idle_clock_label
            align: BOTTOM_MID
            y: -2
            text: ""
            text_color: 0xFFFFFF
            text_font: font_clock
        - label:
            id: idle_battery_label
            align: BOTTOM_MID
            y: -22
            text: ""
            text_color: 0xFFFFFF
            text_font: font_clock

    # ========================================================================
    # VA: LISTENING PAGE (placeholder)
    # ========================================================================
    - id: listening_page
      bg_color: 0xFFFFFF
      widgets:
        - image:
            align: CENTER
            src: assistant_gui_listening

    # ========================================================================
    # VA: THINKING PAGE (chord-width text, same layout as replying)
    # Text starts at row total_rows/2-3 (around row 2), matching original
    # ========================================================================
    - id: thinking_page
      bg_color: 0xFFFFFF
