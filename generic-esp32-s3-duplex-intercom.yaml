# =============================================================================
# GENERIC ESP32-S3 INTERCOM (DUPLEX) - Single I2S bus, no hardware codec
# =============================================================================
# For ESP32 boards where mic and speaker share the SAME I2S bus (shared
# BCLK/LRCLK), using discrete I2S components instead of an audio codec.
#
# Typical setup: I2S MEMS mic (INMP441, MSM261, SPH0645) + I2S class-D
# amplifier (MAX98357A, NS4168) wired to the same BCLK and LRCLK lines,
# with separate DIN (mic data) and DOUT (speaker data) pins.
#
# AEC reference is provided via ring buffer mode inside i2s_audio_duplex.
# intercom_api acts as a lightweight TCP audio forwarder (no AEC, no audio
# tasks of its own).
#
# If your board has a hardware codec (ES8311, ES8388, WM8960, etc.), this
# file is NOT for you. See the i2s_audio_duplex README for codec-specific
# configurations with stereo or TDM AEC reference modes.
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: I2S MEMS (INMP441, MSM261, SPH0645) on DIN pin
#   - Speaker: I2S class-D amp (MAX98357A, NS4168) on DOUT pin
#   - Mic and speaker SHARE BCLK + LRCLK (same I2S bus, full-duplex)
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   Shared I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic), DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  name: generic-esp32-s3-duplex
  friendly_name: Generic Esp32-s3 Duplex

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:

ota:
  - platform: esphome

logger:
  hardware_uart: USB_CDC
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source:
      type: local
      path: esphome/components
    components: [intercom_api, i2s_audio_duplex, esp_aec]

# =============================================================================
# AEC (Acoustic Echo Cancellation)
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

# =============================================================================
# I2S Audio Duplex — single bus, full-duplex (mic + speaker on same BCLK/LRCLK)
# =============================================================================
# MEMS mic on DIN, I2S amp on DOUT, shared clock pins.
# Bus runs at 48kHz for optimal mic quality, FIR decimation to 16kHz for AEC/intercom.
i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO37          # Left side pin "37" (WS) - shared with mic
  i2s_bclk_pin: GPIO36           # Left side pin "36" (SCK) - shared with mic
  i2s_din_pin: GPIO35            # Left side pin "35" (SD) - mic data
  i2s_dout_pin: GPIO7            # Right side pin "07" - amp DIN
  sample_rate: 48000             # Bus rate: 48kHz (MSM261 native, BCLK=3.072MHz)
  output_sample_rate: 16000      # Mic/AEC output at 16kHz via FIR decimation
  slot_bit_width: 32
  correct_dc_offset: true        # MSM261 has no built-in HPF (unlike INMP441)
  aec_id: aec_processor
  buffers_in_psram: true         # Required for sr_low_cost (512-sample frames)

# =============================================================================
# Microphone (via i2s_audio_duplex, post-AEC)
# =============================================================================
microphone:
  - platform: i2s_audio_duplex
    id: mic_component
    i2s_audio_duplex_id: i2s_duplex

# =============================================================================
# Speaker Pipeline: hw_speaker → mixer (48kHz) ← resampler ← sources
# =============================================================================
speaker:
  # Hardware output: writes 48kHz PCM to I2S bus
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 48000

  # Mixer combines media and intercom at 48kHz
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    source_speakers:
      - id: media_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: announcement_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: intercom_speaker_mix
        timeout: 10s
        buffer_duration: 100ms

  # Resamplers: convert any input rate to 48kHz before the mixer
  - platform: resampler
    id: media_speaker
    output_speaker: media_speaker_mix

  - platform: resampler
    id: announcement_speaker
    output_speaker: announcement_speaker_mix

  - platform: resampler
    id: intercom_speaker
    output_speaker: intercom_speaker_mix

# =============================================================================
# Media Player
# =============================================================================
media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    internal: false
    media_pipeline:
      speaker: media_speaker
      sample_rate: 48000
      format: FLAC
    announcement_pipeline:
      speaker: announcement_speaker
      sample_rate: 48000
      format: FLAC

# =============================================================================
# INTERCOM API - no aec_id (AEC handled by i2s_audio_duplex)
# =============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_component
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s

  on_outgoing_call:
    - light.turn_on:
        id: status_led
        effect: "Calling"
    - if:
        condition:
          lambda: 'return id(intercom).get_current_destination() == "Home Assistant";'
        then:
          - homeassistant.event:
              event: esphome.intercom_call
              data:
                caller: "${friendly_name}"
                destination: "Home Assistant"
                type: "doorbell"

  on_ringing:
    - light.turn_on:
        id: status_led
        effect: "Ringing"
        red: 100%
        green: 0%
        blue: 0%

  on_answered:
    - logger.log: "Call answered"

  on_streaming:
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 100%
        effect: none

  on_idle:
    - script.execute: restore_led

  on_hangup:
    - script.execute: restore_led
    - logger.log:
        format: "Hangup: %s"
        args: ['reason.c_str()']

  on_call_failed:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 70%
        effect: none
    - delay: 2s
    - script.execute: restore_led
    - logger.log:
        format: "Call failed: %s"
        args: ['reason.c_str()']

# =============================================================================
# Scripts
# =============================================================================
script:
  - id: restore_led
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: mute
              - switch.is_on: speaker_mute
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 40%
                effect: "Slow Pulse"
          else:
            - if:
                condition:
                  switch.is_on: mute
                then:
                  - light.turn_on:
                      id: status_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 30%
                      effect: none
                else:
                  - if:
                      condition:
                        switch.is_on: speaker_mute
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 100%
                            green: 50%
                            blue: 0%
                            brightness: 30%
                            effect: none
                      else:
                        - if:
                            condition:
                              or:
                                - intercom_api.is_ringing: intercom
                                - intercom_api.is_incoming: intercom
                            then:
                              - logger.log: "restore_led: ringing, keeping strobe"
                            else:
                              - if:
                                  condition:
                                    intercom_api.is_in_call: intercom
                                  then:
                                    - light.turn_on:
                                        id: status_led
                                        red: 0%
                                        green: 100%
                                        blue: 0%
                                        brightness: 100%
                                        effect: none
                                  else:
                                    - light.turn_off: status_led

# =============================================================================
# Buttons
# =============================================================================
button:
  - platform: template
    id: call_button
    name: Call
    icon: mdi:phone
    on_press:
      - intercom_api.call_toggle: intercom

  - platform: template
    id: next_contact_button
    name: Next Contact
    icon: mdi:skip-next
    on_press:
      - intercom_api.next_contact: intercom

  - platform: template
    id: prev_contact_button
    name: Previous Contact
    icon: mdi:skip-previous
    on_press:
      - intercom_api.prev_contact: intercom

  - platform: template
    id: decline_button
    name: Decline
    icon: mdi:phone-hangup
    on_press:
      - intercom_api.decline_call: intercom

  - platform: restart
    name: Restart

# =============================================================================
# Switches
# =============================================================================
switch:
  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF

  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON


  - platform: template
    id: mute
    name: Mic Mute
    icon: mdi:microphone-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - microphone.mute: mic_component
      - script.execute: restore_led
    on_turn_off:
      - microphone.unmute: mic_component
      - script.execute: restore_led

  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - speaker.mute_on: hw_speaker
      - script.execute: restore_led
    on_turn_off:
      - speaker.mute_off: hw_speaker
      - script.execute: restore_led

# =============================================================================
# Numbers
# =============================================================================
number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    speaker_volume:
      name: Speaker Volume
    mic_gain:
      name: Mic Gain

# =============================================================================
# Status LED (SK6812 on GPIO33 — change pin/chipset for your board)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    icon: mdi:led-on
    pin: GPIO33
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - strobe:
          name: "Calling"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 50%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

# =============================================================================
# Text Sensors
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'

# =============================================================================
# Diagnostics
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: Status
