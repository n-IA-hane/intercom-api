# =============================================================================
# GENERIC ESP32-S3 VA INTERCOM — i2s_audio_duplex single bus
# =============================================================================
#
# Voice Assistant + Micro Wake Word + Intercom on a single I2S bus.
# Uses i2s_audio_duplex for full-duplex I2S (mic RX + speaker TX on same port)
# with integrated AEC (software reference from speaker ring buffer).
#
# HARDWARE (adapt GPIOs and settings to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM (quad or octal)
#   - Microphone: Any I2S MEMS mic (INMP441, MSM261, SPH0645)
#   - Speaker: Any I2S amplifier (MAX98357A, NS4168, PCM5102A)
#   - LED: WS2812/SK6812 RGB (optional)
#
# SINGLE I2S BUS WIRING:
#   Mic and amp share BCLK + LRCLK, with separate data pins.
#
#   ESP32-S3 pin  ->  Mic pin     ->  Amp pin
#   ─────────────────────────────────────────────
#   GPIO5 (BCLK)  ->  SCK/BCLK   ->  BCLK
#   GPIO6 (LRCLK) ->  WS/LRCLK   ->  LRC
#   GPIO35 (DIN)   <-  SD/DOUT
#   GPIO7 (DOUT)                  ->  DIN
#   GND            ->  GND        ->  GND
#   3V3            ->  VDD
#   5V (or 3V3)                   ->  VIN
#
# Audio pipeline (i2s_audio_duplex at 16kHz, software AEC reference):
#
#   MEMS mic → I2S RX ──── AEC (SR linear) → mic_aec → VA / Intercom TX / MWW
#                               ↑
#   Music/radio → media_speaker ┼── mixer (16kHz) → hw_speaker → I2S TX → Amp
#   VA TTS      → tts_speaker  ─┤                      │
#   Intercom RX → intercom_spk ─┘                      └── ring buffer → AEC ref
#
# MICROPHONE ALTERNATIVES:
#   MSM261S4030H0R (default):
#     channel: left  (L/R to VCC, convention inverted on this mic)
#
#   INMP441:
#     channel: left  (L/R to GND) or right (L/R to VCC)
#
#   SPH0645:
#     channel: left
#     NOTE: Very low output amplitude. You may need to increase mic_gain
#     significantly (20-30 dB) via the Mic Gain number entity in HA.
#
# SPEAKER ALTERNATIVES:
#   MAX98357A (default), NS4168, PCM5102A — all work as-is.
#   No MCLK needed (MEMS mics and class-D amps don't require it).
#
# =============================================================================

substitutions:
  name: generic-esp32-s3
  friendly_name: Generic Esp32-s3

  # Wake word sensitivity (per-device tuning)
  wake_word_probability_cutoff: "0.60"
  wake_word_sliding_window_size: "6"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.2.0
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: -100
    then:
      - delay: 1s
      - micro_wake_word.start:

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: quad
  speed: 80MHz

# =============================================================================
# CONNECTIVITY
# =============================================================================
api:
  on_client_connected:
    - lambda: 'id(intercom).publish_entity_states();'

ota:
  - platform: esphome

logger:
  hardware_uart: USB_CDC
  level: INFO

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================
external_components:
  - source:
      type: local
      path: esphome/components
    components: [intercom_api, i2s_audio_duplex, esp_aec]

# =============================================================================
# Audio: i2s_audio_duplex (single bus, 16kHz, software AEC reference)
# =============================================================================
# Mic and amp share BCLK/LRCLK on the same I2S port.
# No codec = no MCLK, no TDM, no stereo loopback.
# AEC uses software reference (speaker ring buffer).

esp_aec:
  id: aec_processor
  sample_rate: 16000
  mode: sr_low_cost        # Linear AEC — preserves spectral features for MWW
  filter_length: 4         # 64ms tail

i2s_audio_duplex:
  id: i2s_duplex
  i2s_lrclk_pin: GPIO6
  i2s_bclk_pin: GPIO5
  i2s_din_pin: GPIO35      # From MEMS mic
  i2s_dout_pin: GPIO7      # To I2S amplifier
  sample_rate: 16000        # Bus rate (no codec = no need for 48kHz)
  output_sample_rate: 16000 # No decimation needed at 16kHz
  aec_id: aec_processor
  buffers_in_psram: true    # Required for sr_low_cost (512-sample frames)

# mic_aec: post-AEC for VA STT, intercom TX, AND MWW
microphone:
  - platform: i2s_audio_duplex
    id: mic_aec
    i2s_audio_duplex_id: i2s_duplex

# Speaker pipeline: hw_speaker → mixer (3 sources)
speaker:
  - platform: i2s_audio_duplex
    id: hw_speaker
    i2s_audio_duplex_id: i2s_duplex
    sample_rate: 16000

  # 3-source mixer: media (duckable) + TTS + intercom
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: media_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: tts_speaker_mix
        timeout: 10s
        buffer_duration: 100ms
      - id: intercom_speaker_mix
        timeout: 10s
        buffer_duration: 100ms

  # ResamplerSpeakers: convert any input rate to 16kHz before the mixer
  - platform: resampler
    id: media_speaker
    output_speaker: media_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: tts_speaker
    output_speaker: tts_speaker_mix
    task_stack_in_psram: true

  - platform: resampler
    id: intercom_speaker
    output_speaker: intercom_speaker_mix
    task_stack_in_psram: true

# =============================================================================
# Media Player
# =============================================================================
media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    internal: false
    media_pipeline:
      speaker: media_speaker
      sample_rate: 16000
      format: FLAC
    announcement_pipeline:
      speaker: tts_speaker
      sample_rate: 16000
      format: FLAC
    files:
      - id: intercom_ringing_sound
        file: sounds/ringtone.flac
    on_announcement:
      - logger.log: "Announcement started"
    on_pause:
      - media_player.stop:
    on_idle:
      - light.turn_off: status_led
      - delay: 300ms
      - script.execute: restore_led

# =============================================================================
# Micro Wake Word
# =============================================================================
micro_wake_word:
  id: mww
  microphone: mic_aec
  stop_after_detection: false
  on_wake_word_detected:
    # Acquire audio focus: duck media
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    # Barge-in: if VA/TTS active, stop and let va_end_handler restart VA
    - if:
        condition:
          or:
            - media_player.is_announcing:
            - voice_assistant.is_running:
        then:
          - globals.set:
              id: restart_intent
              value: "true"
          - voice_assistant.stop:
          - media_player.stop:
              announcement: true
        else:
          # Fresh start (no VA running)
          - voice_assistant.start:
              wake_word: !lambda return wake_word;
  models:
    - model: alexa

# =============================================================================
# Voice Assistant
# =============================================================================
voice_assistant:
  id: va
  microphone: mic_aec
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_listening:
    - light.turn_on:
        id: status_led
        red: 0%
        green: 100%
        blue: 0%
        brightness: 70%
        effect: "Slow Pulse"

  on_stt_vad_end:
    - light.turn_on:
        id: status_led
        red: 100%
        green: 55%
        blue: 0%
        brightness: 70%
        effect: "Fast Pulse"

  on_tts_start:
    - light.turn_on:
        id: status_led
        red: 30%
        green: 30%
        blue: 70%
        brightness: 60%
        effect: none

  on_end:
    - script.execute: va_end_handler

  on_error:
    - globals.set:
        id: restart_intent
        value: "false"
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 0
        duration: 300ms
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - light.turn_on:
              id: status_led
              red: 100%
              green: 0%
              blue: 0%
              brightness: 70%
              effect: none
          - delay: 2s
          - script.execute: restore_led

  on_client_connected:
    - globals.set:
        id: init_in_progress
        value: 'false'
    - if:
        condition:
          and:
            - switch.is_off: mute
            - not:
                lambda: 'return id(mww).is_running();'
        then:
          - micro_wake_word.start:
    # Boost MWW task priority (default 3 → 8)
    - delay: 1s
    - lambda: |-
        TaskHandle_t mww_task = xTaskGetHandle("mww");
        if (mww_task) {
          vTaskPrioritySet(mww_task, 8);
        }

  on_client_disconnected:
    - micro_wake_word.stop:

# =============================================================================
# Intercom API
# =============================================================================
intercom_api:
  id: intercom
  mode: full
  microphone: mic_aec
  speaker: intercom_speaker
  ringing_timeout: 30s

  on_outgoing_call:
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: "Ringing"
        red: 100%
        green: 50%
        blue: 0%
    - if:
        condition:
          lambda: 'return id(intercom).get_current_destination() == "Home Assistant";'
        then:
          - homeassistant.event:
              event: esphome.intercom_call
              data:
                caller: !lambda 'return App.get_friendly_name();'
                destination: "Home Assistant"
                type: "doorbell"

  on_ringing:
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: "Ringing"
        red: 100%
        green: 0%
        blue: 0%
    - script.execute: intercom_ringing_loop

  on_answered:
    - logger.log: "Call answered"

  on_streaming:
    - script.stop: intercom_ringing_loop
    - mixer_speaker.apply_ducking:
        id: media_speaker_mix
        decibel_reduction: 20
        duration: 200ms
    - light.turn_on:
        id: status_led
        effect: none
        red: 30%
        green: 69%
        blue: 31%
        brightness: 100%

  on_idle:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - script.execute: restore_led

  on_hangup:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - script.execute: restore_led
    - logger.log:
        format: "Hangup: %s"
        args: ['reason.c_str()']

  on_call_failed:
    - script.stop: intercom_ringing_loop
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - mixer_speaker.apply_ducking:
              id: media_speaker_mix
              decibel_reduction: 0
              duration: 500ms
    - light.turn_on:
        id: status_led
        red: 100%
        green: 0%
        blue: 0%
        brightness: 70%
        effect: none
    - delay: 2s
    - script.execute: restore_led
    - logger.log:
        format: "Call failed: %s"
        args: ['reason.c_str()']

# =============================================================================
# Globals
# =============================================================================
globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: restart_intent
    type: bool
    restore_value: false
    initial_value: "false"

# =============================================================================
# Scripts
# =============================================================================
script:
  # VA end handler — mode: restart ensures barge-in cancels previous on_end
  - id: va_end_handler
    mode: restart
    then:
      - wait_until:
          condition:
            - media_player.is_announcing:
          timeout: 0.5s
      - wait_until:
          condition:
            and:
              - not:
                  media_player.is_announcing:
              - not:
                  speaker.is_playing:
                      id: tts_speaker
          timeout: 30s
      - if:
          condition:
            or:
              - media_player.is_announcing:
              - speaker.is_playing:
                  id: tts_speaker
          then:
            - logger.log:
                level: WARN
                format: "VA: TTS drain timeout, forcing cleanup"
            - media_player.stop:
                announcement: true
      - delay: 100ms
      - voice_assistant.stop:
      # Barge-in: restart VA. Otherwise release audio focus.
      - if:
          condition:
            lambda: 'return id(restart_intent);'
          then:
            - globals.set:
                id: restart_intent
                value: "false"
            - voice_assistant.start:
          else:
            - mixer_speaker.apply_ducking:
                id: media_speaker_mix
                decibel_reduction: 0
                duration: 500ms
            - script.execute: restore_led

  - id: restore_led
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: mute
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 30%
                effect: none
          else:
            - if:
                condition:
                  or:
                    - intercom_api.is_ringing: intercom
                    - intercom_api.is_incoming: intercom
                then:
                  - logger.log: "restore_led: ringing, keeping strobe"
                else:
                  - if:
                      condition:
                        intercom_api.is_in_call: intercom
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 30%
                            green: 69%
                            blue: 31%
                            brightness: 100%
                            effect: none
                      else:
                        - if:
                            condition:
                              or:
                                - media_player.is_announcing:
                                - media_player.is_playing:
                            then:
                              - light.turn_on:
                                  id: status_led
                                  red: 0%
                                  green: 100%
                                  blue: 0%
                                  brightness: 100%
                                  effect: "Spin"
                            else:
                              - light.turn_off: status_led

  - id: intercom_ringing_loop
    mode: restart
    then:
      - while:
          condition:
            or:
              - intercom_api.is_ringing: intercom
              - intercom_api.is_incoming: intercom
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: intercom_ringing_sound
                announcement: true
            - delay: 3s

  # Wake word management (guarded)
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - switch.is_off: mute
          then:
            - micro_wake_word.start:

# =============================================================================
# Buttons (exposed to HA card)
# =============================================================================
button:
  - platform: template
    id: call_button
    name: Call
    icon: mdi:phone
    on_press:
      - intercom_api.call_toggle: intercom

  - platform: template
    id: next_contact_button
    name: Next Contact
    icon: mdi:skip-next
    on_press:
      - intercom_api.next_contact: intercom

  - platform: template
    id: prev_contact_button
    name: Previous Contact
    icon: mdi:skip-previous
    on_press:
      - intercom_api.prev_contact: intercom

  - platform: template
    id: decline_button
    name: Decline
    icon: mdi:phone-hangup
    on_press:
      - intercom_api.decline_call: intercom

  - platform: restart
    name: Restart

# =============================================================================
# Switches
# =============================================================================
switch:
  - platform: template
    id: mute
    name: Mic Mute
    icon: mdi:microphone-off
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - micro_wake_word.stop:
      - microphone.mute: mic_aec
      - script.execute: restore_led
    on_turn_off:
      - microphone.unmute: mic_aec
      - micro_wake_word.start:
      - script.execute: restore_led

  - platform: template
    name: Wake Word
    id: wake_word_switch
    icon: mdi:account-voice
    restore_mode: DISABLED
    lambda: 'return id(mww).is_running();'
    turn_on_action:
      - if:
          condition:
            not:
              lambda: 'return id(mww).is_running();'
          then:
            - micro_wake_word.start:
    turn_off_action:
      - micro_wake_word.stop:

  - platform: intercom_api
    intercom_api_id: intercom
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF

  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: RESTORE_DEFAULT_ON

# =============================================================================
# Numbers
# =============================================================================
number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      name: Mic Gain

# =============================================================================
# Select Entities
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "sr_low_cost"
    optimistic: true
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - lambda: |-
                if (id(va).is_running() || !id(intercom).is_idle()) {
                  ESP_LOGW("aec_mode", "Cannot switch AEC mode during active VA/intercom");
                  return;
                }
                int mode = 0;
                if (x == "sr_low_cost") mode = 0;
                else if (x == "sr_high_perf") mode = 1;
                else if (x == "voip_low_cost") mode = 3;
                else if (x == "voip_high_perf") mode = 4;
                id(i2s_duplex).stop();
                if (!id(aec_processor).reinit(static_cast<aec_mode_t>(mode))) {
                  ESP_LOGE("aec_mode", "AEC reinit failed!");
                }
                id(i2s_duplex).start();
            - micro_wake_word.stop:
            - delay: 300ms
            - if:
                condition:
                  switch.is_off: mute
                then:
                  - micro_wake_word.start:

# =============================================================================
# Text Sensors
# =============================================================================
text_sensor:
  - platform: homeassistant
    id: ha_active_devices
    entity_id: sensor.intercom_active_devices
    on_value:
      - intercom_api.set_contacts:
          id: intercom
          contacts_csv: !lambda 'return x;'

# =============================================================================
# Status LED (WS2812/SK6812 on GPIO38)
# =============================================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: Status LED
    icon: mdi:led-on
    pin: GPIO38
    chipset: SK6812
    num_leds: 1
    rgb_order: GRB
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s
          update_interval: 0.5s
          min_brightness: 0%
          max_brightness: 100%
      - strobe:
          name: "Ringing"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 250ms
            - state: false
              duration: 250ms
      - addressable_rainbow:
          name: "Spin"
          speed: 30

# =============================================================================
# Diagnostics
# =============================================================================
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: Uptime
    update_interval: 60s
    entity_category: diagnostic

  - platform: internal_temperature
    name: CPU Temperature
    update_interval: 60s
    entity_category: diagnostic

  - platform: debug
    free:
      name: Heap Free
      entity_category: diagnostic
    block:
      name: Heap Largest Block
      entity_category: diagnostic
    psram:
      name: PSRAM Free
      entity_category: diagnostic

debug:
  update_interval: 60s

binary_sensor:
  - platform: status
    name: Status
